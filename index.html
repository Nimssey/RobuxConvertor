<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Minimal Robux to USD and EUR converter with selectable creator payout rates.">
	<title>Robux Convertor</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="page">
		<section class="converter" aria-labelledby="title">
			<header class="header">
				<h1 id="title">Convert Robux to Money</h1>
			</header>

			<form class="panel" id="converterForm">
				<label class="field">
					<span class="label">Robux</span>
					<span class="inputGroup">
						<input id="robuxInput" type="text" inputmode="decimal" autocomplete="off" placeholder="0">
						<span class="unit">Robux</span>
					</span>
				</label>

				<label class="field">
					<span class="label">Value</span>
					<span class="inputGroup">
						<input id="valueOutput" type="text" readonly value="$0.00">
						<span class="unit" id="currencyUnit">USD</span>
					</span>
				</label>

				<div class="controls" aria-label="Conversion settings">
					<label class="control">
						<span class="label">Currency</span>
						<select id="currencySelect">
							<option value="USD">USD</option>
							<option value="EUR">EUR</option>
						</select>
					</label>

					<label class="control">
						<span class="label">Rate</span>
						<select id="rateSelect">
							<option value="0.0038">Standard rate - $0.0038 / Robux</option>
							<option value="0.0054">18+ US Player rate - $0.0054 / Robux</option>
							<option value="0.0035">Legacy/manual rate - $0.0035 / Robux</option>
						</select>
					</label>

					<div class="control hidden" id="eurRateControl">
						<span class="label">USD to EUR</span>
						<span class="rateStatus" id="eurRateStatus">Syncing live rate...</span>
					</div>
				</div>
			</form>

			<p class="description" id="rateDescription">
				Standard Rate: $0.0038 per Robux, equal to $38 per 10,000 Robux.
			</p>

			<footer class="footer">
				<span>Like the convertor? Check out my other work</span>
			</footer>

			<a class="githubBadge" href="https://github.com/Nimssey?tab=repositories" target="_blank" rel="noreferrer" aria-label="Open Nimssey GitHub public repositories">
				<svg viewBox="0 0 24 24" role="img" aria-hidden="true">
					<path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.52 2.86 8.34 6.84 9.7.5.1.68-.22.68-.5v-1.74c-2.78.62-3.36-1.38-3.36-1.38-.46-1.18-1.12-1.5-1.12-1.5-.9-.64.08-.62.08-.62 1 .08 1.52 1.06 1.52 1.06.9 1.56 2.34 1.1 2.9.84.1-.66.36-1.1.64-1.36-2.22-.26-4.56-1.14-4.56-5.04 0-1.12.38-2.02 1.02-2.74-.1-.26-.44-1.3.1-2.7 0 0 .84-.28 2.76 1.04A9.3 9.3 0 0 1 12 6.94c.86 0 1.72.12 2.52.34 1.9-1.32 2.74-1.04 2.74-1.04.56 1.4.22 2.44.12 2.7.64.72 1.02 1.62 1.02 2.74 0 3.92-2.34 4.78-4.58 5.04.36.32.68.94.68 1.9v2.8c0 .28.18.6.7.5A10.15 10.15 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"></path>
				</svg>
				<span>Nimssey</span>
			</a>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
